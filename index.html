<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>聊天養成</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #1e1e2f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.game {
  width: 650px;
  height: 420px;
  background: #2a2a40;
  border-radius: 15px;
  display: flex;
}

/* 左側 */
.left {
  width: 30%;
  background: #343456;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.name {
  font-size: 18px;
  margin-bottom: 10px;
}

.mood {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 10px;
}

.bar {
  width: 80%;
  height: 15px;
  background: #555;
  border-radius: 10px;
}

.fill {
  height: 100%;
  width: 50%;
  background: pink;
}

/* 右側 */
.right {
  width: 70%;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 5px 0;
}

.user {
  text-align: right;
  color: #9fe6ff;
}

.bot {
  color: #ffb3d9;
}

/* 輸入 */
.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  background: #222;
  color: white;
}

button {
  width: 70px;
  border: none;
  background: #ff5fa2;
  color: white;
}
</style>
</head>

<body>

<div class="game">

  <!-- 左 -->
  <div class="left">
    <div class="name">傲嬌醬</div>
    <div id="mood" class="mood">普通</div>

    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>
    <div id="favorText">好感度 50</div>
  </div>

  <!-- 右 -->
  <div class="right">
    <div id="messages" class="messages"></div>

    <div class="input-area">
      <input id="input" placeholder="輸入訊息...">
      <button onclick="send()">送出</button>
    </div>
  </div>

</div>

<script>
let favor = 50;

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function updateUI() {
  fill.style.width = favor + "%";
  favorText.innerText = "好感度 " + favor;

  // 情緒顯示
  if (favor > 70) {
    mood.innerText = "害羞中 😳";
  } else if (favor < 30) {
    mood.innerText = "生氣 😡";
  } else {
    mood.innerText = "普通 😐";
  }
}

function reply(input) {
  let r = "哼...隨便啦";

  if (input.includes("喜歡")) {
    favor += 10;
    r = "誰喜歡你啊！😳";
  } else if (input.includes("討厭")) {
    favor -= 10;
    r = "那就別來找我😡";
  } else if (input.includes("你好")) {
    favor += 5;
    r = "才、才沒有在等你呢";
  }

  // 高好感度
  if (favor > 70) {
    r += "\n（小聲）其實我有點開心...";
  }

  favor = Math.max(0, Math.min(100, favor));
  updateUI();

  setTimeout(() => addMsg(r, "bot"), 300);
}

function send() {
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  reply(text);

  input.value = "";
}
</script>

</body>
</html>
