<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>心理測驗</title>

<style>
body{
  background:#000;
  color:#0f0;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  overflow:hidden;
}

#game{
  width:90%;
  max-width:500px;
}

#text{
  min-height:120px;
  white-space:pre-line;
}

button,input{
  margin-top:10px;
  background:#111;
  color:#0f0;
  border:1px solid #0f0;
  padding:8px;
}

/* glitch */
.glitch{
  animation: glitch 0.08s infinite;
}

@keyframes glitch{
  0%{transform:translate(1px,0)}
  50%{transform:translate(-1px,1px)}
  100%{transform:translate(1px,-1px)}
}

/* flicker */
.flicker{
  animation: flicker 0.15s infinite;
}

@keyframes flicker{
  0%{opacity:1}
  50%{opacity:0.4}
  100%{opacity:1}
}

/* noise */
#noise{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  opacity:0.08;
  background:url('https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif');
  display:none;
}
</style>
</head>

<body>

<div id="noise"></div>

<div id="game">
  <div id="text"></div>
  <div id="input"></div>
</div>

<script>

const textEl = document.getElementById("text");
const inputEl = document.getElementById("input");

let playerName = "";
let affection = 0;

/* 打字（慢+卡頓） */
function typeText(text, speed=40){
  return new Promise(resolve=>{
    textEl.innerText="";
    let i=0;

    function typing(){
      if(i < text.length){
        textEl.innerText += text[i];
        let randomDelay = Math.random()*speed*0.8;
        setTimeout(typing, speed + randomDelay);
        i++;
      }else resolve();
    }

    typing();
  });
}

/* 選項 */
function showChoices(choices){
  inputEl.innerHTML="";
  choices.forEach(c=>{
    let btn=document.createElement("button");
    btn.innerText=c.text;
    btn.onclick=()=>{
      affection += c.affection || 0;
      c.next();
    };
    inputEl.appendChild(btn);
  });
}

/* 名字 */
function askName(){
  textEl.innerText="告訴我你的名字…";
  inputEl.innerHTML='<input id="nameInput"><button onclick="saveName()">確定</button>';
}

function saveName(){
  playerName=document.getElementById("nameInput").value || "你";
  inputEl.innerHTML="";
  scene1();
}

/* 污染 */
function corruptText(level=1){

  if(level===1){
    textEl.classList.add("glitch");
  }

  if(level===2){
    textEl.classList.add("glitch","flicker");

    let original = textEl.innerText;
    textEl.innerText = original.split("").map(c=>{
      return Math.random()<0.15 ? "░" : c;
    }).join("");
  }

  if(level===3){
    document.getElementById("noise").style.display="block";

    let glitchInterval = setInterval(()=>{
      document.body.style.background =
        Math.random()>0.5 ? "#000" : "#111";
    },80);

    setTimeout(()=>clearInterval(glitchInterval),2000);
  }
}

/* jump scare */
function jumpScare(msg){
  textEl.innerText=msg;
  textEl.style.fontSize="42px";
  textEl.style.color="red";
  textEl.classList.add("glitch");

  document.body.style.background="#fff";

  let audio = new Audio("https://www.soundjay.com/human/sounds/scream-01.mp3");
  audio.play().catch(()=>{});

  setTimeout(()=>{
    document.body.style.background="#000";
    textEl.style.fontSize="20px";
    textEl.style.color="#0f0";
  },150);
}

/* 開始 */
async function scene1(){
  await typeText("開始測驗...",40);

  await typeText("現在時間是："+new Date().toLocaleTimeString(),35);

  await new Promise(r=>setTimeout(r,800));

  await typeText("我也是在這個時間看到你的",120);

  await typeText("你一個人在房間時會？",60);

  showChoices([
    {text:"滑手機",affection:1,next:scene2},
    {text:"發呆",affection:2,next:scene2},
    {text:"關燈",affection:3,next:scene2}
  ]);
}

/* 中段 */
async function scene2(){
  await typeText("如果有人一直看著你？",80);

  showChoices([
    {text:"無視",affection:1,next:scene3},
    {text:"有點不舒服",affection:2,next:scene3},
    {text:"覺得熟悉",affection:4,next:scene3}
  ]);
}

/* 異常 */
async function scene3(){
  await typeText("你相信『被注視』嗎？",100);

  showChoices([
    {text:"不信",affection:1,next:ending},
    {text:"有可能",affection:3,next:ending},
    {text:"一直都在",affection:5,next:ending}
  ]);
}

/* 結尾 */
async function ending(){

  inputEl.innerHTML="";

  await typeText("分析中...",80);
  await new Promise(r=>setTimeout(r,800));

  await typeText("你的結果是：",100);

  if(affection<5){
    await typeText("【普通型人格】",120);
  }else if(affection<9){
    await typeText("【敏感型人格】",140);
  }else{
    await typeText("【連結型人格】",160);
  }

  await new Promise(r=>setTimeout(r,1200));

  await typeText("..."+playerName+"…",140);
  corruptText(1);

  await new Promise(r=>setTimeout(r,1500));

  await typeText("你有沒有發現…",160);
  corruptText(2);

  await new Promise(r=>setTimeout(r,1200));

  await typeText("問題越來越不像測驗？",180);
  corruptText(3);

  await new Promise(r=>setTimeout(r,1000));

  await typeText("不要回頭",200);

  // jump scare
  setTimeout(()=>{
    jumpScare(playerName+"，我就在你後面");
  },800);

  setTimeout(async ()=>{
    await typeText("…現在你是我的了",200);
  },2800);

  // 偽安全 → 反轉
  setTimeout(()=>{
    textEl.innerText = playerName+"，你永遠是安全的";

    setTimeout(()=>{
      textEl.innerText = playerName+"░░░現在你永遠是我的了";
    },800);

  },5000);
}

// start
askName();

</script>

</body>
</html>
