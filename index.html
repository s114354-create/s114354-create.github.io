<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>你是怎樣的人呢</title>

<style>
body{
  background:black;
  color:#0f0;
  font-family:monospace;
  text-align:center;
  padding:30px;
}

#text{
  font-size:20px;
  margin:30px;
  min-height:60px;
}

button,input{
  background:black;
  color:#0f0;
  border:1px solid #0f0;
  padding:10px;
  margin:10px;
}

.glitch{
  animation:glitch 0.1s infinite;
}

@keyframes glitch{
  0%{transform:translate(1px,1px);}
  50%{transform:translate(-1px,-1px);}
  100%{transform:translate(1px,-1px);}
}
</style>
</head>

<body>

<div id="text"></div>
<div id="choices"></div>

<script>
let textEl=document.getElementById("text");
let choicesEl=document.getElementById("choices");

let playerName="";
let affection=0;

// 🧠 打字
async function typeText(text,speed=80){
  textEl.innerText="";
  for(let i=0;i<text.length;i++){
    textEl.innerText+=text[i];
    await new Promise(r=>setTimeout(r,speed));
  }
}

// 🧠 名字慢慢出現
async function typeName(name){
  textEl.innerText="";
  for(let i=0;i<name.length;i++){
    textEl.innerText+=name[i];
    await new Promise(r=>setTimeout(r,200));
  }
}

// 🧠 選項
function showChoices(arr){
  choicesEl.innerHTML="";
  arr.forEach(c=>{
    let btn=document.createElement("button");
    btn.innerText=c.text;
    btn.onclick=()=>{
      affection+=c.affection;
      c.next();
    };
    choicesEl.appendChild(btn);
  });
}

// 💀 污染
function corruptText(level=1){
  let chars="█▓▒░<>/\\!?";
  setInterval(()=>{
    let t=textEl.innerText.split("");
    for(let i=0;i<t.length;i++){
      if(Math.random()<0.05*level){
        t[i]=chars[Math.floor(Math.random()*chars.length)];
      }
    }
    textEl.innerText=t.join("");
  },100);
}

// ⚡ 閃光嚇人
function flashJumpScare(){
  let flash=document.createElement("div");
  flash.style.position="fixed";
  flash.style.top="0";
  flash.style.left="0";
  flash.style.width="100%";
  flash.style.height="100%";
  flash.style.background="white";
  flash.style.zIndex="9999";
  document.body.appendChild(flash);

  setTimeout(()=>{
    flash.style.background="red";
    textEl.innerText="不要回頭";
    textEl.style.color="red";
    textEl.classList.add("glitch");
  },80);

  setTimeout(()=>{
    flash.remove();
    textEl.style.color="#0f0";
  },200);
}

// 💀 文字嚇人
function jumpScare(){
  textEl.innerText="你後面有人";
  textEl.classList.add("glitch");
}

// 💀 游標消失
function hideCursor(){
  document.body.style.cursor="none";
}

// 💀 假當機
async function fakeFreeze(){
  textEl.innerText="...";
  await new Promise(r=>setTimeout(r,3000));
}

// 🧠 時間
function getTime(){
  return new Date().toLocaleTimeString();
}

// 🟢 開始
async function start(){
  await typeText("請輸入你的名字");
  choicesEl.innerHTML='<input id="nameInput"><button onclick="submitName()">確定</button>';
}

async function submitName(){
  playerName=document.getElementById("nameInput").value;
  choicesEl.innerHTML="";

  await typeText("正在讀取...");
  await new Promise(r=>setTimeout(r,1000));

  await typeName(playerName);
  await new Promise(r=>setTimeout(r,500));

  await typeText(playerName+"，現在時間是 "+getTime());

  scene1();
}

// 🟢 正常 → 異常

async function scene1(){
  await typeText("你平常喜歡做什麼？");
  showChoices([
    {text:"滑手機",affection:2,next:scene2},
    {text:"睡覺",affection:1,next:scene2},
    {text:"發呆",affection:3,next:scene2}
  ]);
}

async function scene2(){
  await typeText("你相信巧合嗎？");
  showChoices([
    {text:"相信",affection:3,next:scene3},
    {text:"不信",affection:1,next:scene3},
    {text:"看情況",affection:2,next:scene3}
  ]);
}

async function scene3(){
  await typeText("如果有人一直關注你，你會？");
  showChoices([
    {text:"開心",affection:4,next:scene4},
    {text:"不舒服",affection:2,next:scene4},
    {text:"無所謂",affection:3,next:scene4}
  ]);
}

async function scene4(){
  await typeText("你有沒有覺得，手機會自己亮？");
  showChoices([
    {text:"沒有",next:scene5},
    {text:"好像有",next:scene5},
    {text:"常常",next:scene5}
  ]);
}

async function scene5(){
  await new Promise(r=>setTimeout(r,2000));
  await typeText("你現在，是一個人嗎？");
  showChoices([
    {text:"是",next:scene6},
    {text:"不是",next:scene6},
    {text:"不知道",next:scene6}
  ]);
}

// ⚡ 第一次嚇
async function scene6(){
  await typeText("你剛剛，有回頭看嗎？");

  setTimeout(()=>flashJumpScare(),500);

  showChoices([
    {text:"沒有",next:scene7},
    {text:"有",next:scene7},
    {text:"為什麼問",next:scene7}
  ]);
}

async function scene7(){
  await typeText("我有看到你剛剛的選擇");
  showChoices([
    {text:"你怎麼知道",next:scene8},
    {text:"巧合吧",next:scene8},
    {text:"……",next:scene8}
  ]);
}

async function scene8(){
  hideCursor();
  await typeText("這不是測驗，是篩選");
  showChoices([
    {text:"篩選什麼",next:scene9},
    {text:"不好笑",next:scene9},
    {text:"我要關掉",next:scene9}
  ]);
}

// ⚡ 第二次嚇 + 污染
async function scene9(){
  await typeText("畫面開始怪怪的？");
  corruptText(2);

  setTimeout(()=>flashJumpScare(),800);

  showChoices([
    {text:"有",next:scene10},
    {text:"沒有",next:scene10},
    {text:"停止",next:scene10}
  ]);
}

async function scene10(){
  await fakeFreeze();
  await typeText("如果你關掉這個頁面…會怎樣？");

  showChoices([
    {text:"沒事",next:ending},
    {text:"有點怕",next:ending},
    {text:"你會跟來",next:ending}
  ]);
}

// ⚡ 最終
async function ending(){
  choicesEl.innerHTML="";
  textEl.classList.add("glitch");

  await typeText("分析中...");

  flashJumpScare();

  await new Promise(r=>setTimeout(r,1200));

  await typeText(playerName+"，結果已確定");

  jumpScare();

  await new Promise(r=>setTimeout(r,1000));

  await typeText("現在你永遠是我的了");
}

start();
</script>

</body>
</html>
