<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>心理測驗</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#000 40%,#010101 100%);
  font-family:monospace;
  color:#0f0;
}

/* 主卡片 */
#app{
  width:420px;
  padding:30px;
  background:rgba(0,0,0,0.85);
  border:1px solid #0f0;
  box-shadow:0 0 25px rgba(0,255,0,0.2);
  text-align:center;
}

/* 文字 */
#text{
  font-size:20px;
  min-height:80px;
  margin-bottom:20px;
  line-height:1.6;
  animation:fadeIn 0.4s;
}

/* 選項 */
button{
  display:block;
  width:100%;
  margin:8px 0;
  padding:10px;
  background:black;
  color:#0f0;
  border:1px solid #0f0;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#002200;
  box-shadow:0 0 8px #0f0;
}

button:active{
  transform:scale(0.95);
}

/* 輸入 */
input{
  width:90%;
  padding:10px;
  margin:10px 0;
  background:black;
  color:#0f0;
  border:1px solid #0f0;
}

/* glitch */
.glitch{
  animation:glitch 0.12s infinite;
}

@keyframes glitch{
  0%{transform:translate(1px,1px);}
  50%{transform:translate(-1px,-1px);}
  100%{transform:translate(1px,-1px);}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div id="app">
  <div id="text"></div>
  <div id="choices"></div>
</div>

<script>
let textEl=document.getElementById("text");
let choicesEl=document.getElementById("choices");

let playerName="";
let lastChoiceText="";

// 🐢 打字
async function typeText(text, speed=80){
  textEl.innerText="";
  for(let i=0;i<text.length;i++){
    textEl.innerText+=text[i];
    let delay=speed+Math.random()*100;
    if(/[，。！？]/.test(text[i])) delay+=200;
    await new Promise(r=>setTimeout(r,delay));
  }
}

async function typeName(name){
  textEl.innerText="";
  for(let c of name){
    textEl.innerText+=c;
    await new Promise(r=>setTimeout(r,180));
  }
}

function showChoices(arr){
  choicesEl.innerHTML="";
  arr.forEach(c=>{
    let btn=document.createElement("button");
    btn.innerText=c.text;
    btn.onclick=()=>{
      lastChoiceText=c.text;
      c.next();
    };
    choicesEl.appendChild(btn);
  });
}

// ⚡ 閃
function flashJumpScare(){
  let f=document.createElement("div");
  f.style.position="fixed";
  f.style.inset="0";
  f.style.display="flex";
  f.style.alignItems="center";
  f.style.justifyContent="center";
  f.style.fontSize="40px";
  f.style.zIndex="9999";
  document.body.appendChild(f);

  f.style.background="white";
  f.innerText=playerName+"，不要回頭";

  setTimeout(()=>{f.style.background="red";f.innerText="我一直在看你";},180);
  setTimeout(()=>{f.style.background="black";f.style.color="red";f.innerText="你逃不掉";},360);
  setTimeout(()=>f.remove(),650);
}

// 📺 雜訊
function noiseScreen(){
  let n=document.createElement("div");
  n.style.position="fixed";
  n.style.inset="0";
  n.style.background="black";
  n.style.color="#0f0";
  n.style.fontSize="10px";
  n.style.whiteSpace="pre-wrap";
  n.style.zIndex="9998";
  document.body.appendChild(n);

  let chars="█▓▒░";
  let i=setInterval(()=>{
    let t="";
    for(let k=0;k<900;k++){
      t+=chars[Math.random()*chars.length|0];
    }
    n.innerText=t;
  },50);

  return {n,i};
}

// ⚡ 大閃
function bigFlash(){
  let f=document.createElement("div");
  f.style.position="fixed";
  f.style.inset="0";
  f.style.background="white";
  f.style.zIndex="9999";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),150);
}

// 🌑 黑屏
function blackScreen(){
  let b=document.createElement("div");
  b.style.position="fixed";
  b.style.inset="0";
  b.style.background="black";
  b.style.zIndex="9999";
  document.body.appendChild(b);
  return b;
}

// 🟢 開始
async function start(){
  await typeText("請輸入你的名字");
  choicesEl.innerHTML='<input id="nameInput"><button onclick="submitName()">確定</button>';
}

async function submitName(){
  playerName=document.getElementById("nameInput").value;
  choicesEl.innerHTML="";

  await typeText("正在讀取...");
  await typeName(playerName);
  await typeText(playerName+"，現在時間是 "+new Date().toLocaleTimeString());

  scene1();
}

// 🟢 流程（精簡）
async function scene1(){
  await typeText("你現在，是一個人嗎？");
  showChoices([
    {text:"是",next:scene2},
    {text:"不是",next:scene2},
    {text:"不知道",next:scene2}
  ]);
}

async function scene2(){
  await typeText("你剛剛，有回頭看嗎？");
  setTimeout(flashJumpScare,900);
  showChoices([
    {text:"沒有",next:scene3},
    {text:"有",next:scene3},
    {text:"為什麼問",next:scene3}
  ]);
}

async function scene3(){
  await typeText("你剛剛選了「"+lastChoiceText+"」");
  showChoices([
    {text:"你怎麼知道",next:ending},
    {text:"巧合吧",next:ending},
    {text:"……",next:ending}
  ]);
}

// ☠️ 終極收尾
async function ending(){
  choicesEl.innerHTML="";
  textEl.classList.add("glitch");

  await typeText("分析中...");
  await typeText("已找到匹配對象");

  flashJumpScare();

  await typeText(playerName+"，你的結果是：");
  await typeText("『適合被持續觀察的人』");
  await typeText("現在你永遠是我的了");

  let {n,i}=noiseScreen();
  await new Promise(r=>setTimeout(r,1500));

  bigFlash();
  clearInterval(i);
  n.remove();

  let black=blackScreen();

  await new Promise(r=>setTimeout(r,5000));

  let w=document.createElement("div");
  w.style.position="fixed";
  w.style.top="50%";
  w.style.left="50%";
  w.style.transform="translate(-50%,-50%)";
  w.style.color="white";
  w.style.fontSize="22px";
  w.style.zIndex="10000";
  w.innerText="你還在看嗎？";
  document.body.appendChild(w);

  await new Promise(r=>setTimeout(r,2500));
  w.innerText="";
  await new Promise(r=>setTimeout(r,1500));

  black.remove();
  w.remove();

  textEl.classList.remove("glitch");
  textEl.innerText="";
  await typeText("感謝遊玩");
}

start();
</script>

</body>
</html>
