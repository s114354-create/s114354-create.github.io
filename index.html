<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>心理測驗喔喵</title>

<style>
body {
  background: black;
  color: white;
  font-family: monospace;
  text-align: center;
  padding: 30px;
  transition: 0.3s;
}

#box {
  max-width: 600px;
  margin: auto;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  background: #111;
  color: white;
  border: 1px solid #555;
  cursor: pointer;
}

button:hover {
  background: #222;
}

.glitch {
  animation: shake 0.15s infinite;
  color: red;
}

@keyframes shake {
  0% { transform: translate(1px,1px); }
  50% { transform: translate(-1px,-2px); }
  100% { transform: translate(1px,-1px); }
}

#jumpscare {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:red;
  font-size:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:0.2s;
}
</style>
</head>

<body>

<div id="time"></div>
<div id="nameDisplay"></div>

<div id="box">
  <h2 id="text"></h2>
  <div id="choices"></div>
</div>

<div id="jumpscare">我在你後面</div>

<script>
let playerName = "";
let corruption = 0;

let score = { rational:0, fear:0, attach:0 };

let step = 0;

const questions = [
  {
    q:"晚上你通常在做什麼？",
    c:[
      ["滑手機","attach"],
      ["工作","rational"],
      ["發呆","fear"]
    ]
  },
  {
    q:"你聽到奇怪聲音時會？",
    c:[
      ["去查看","rational"],
      ["躲起來","fear"],
      ["找人聊天","attach"]
    ]
  },
  {
    q:"你覺得有人在看你嗎？",
    c:[
      ["沒有","rational"],
      ["可能有","fear"],
      ["希望有","attach"]
    ]
  },
  {
    q:"如果有人一直陪你，你會？",
    c:[
      ["接受","attach"],
      ["拒絕","rational"],
      ["害怕","fear"]
    ]
  }
];

function typeText(text, el, speed=40) {
  el.innerHTML = "";
  let i = 0;
  let interval = setInterval(()=>{
    el.innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  }, speed);
}

function typeName(name) {
  let el = document.getElementById("nameDisplay");
  el.innerHTML = "使用者：";
  let i=0;
  let interval=setInterval(()=>{
    el.innerHTML += name[i];
    i++;
    if(i>=name.length) clearInterval(interval);
  },150);
}

function corruptName(name){
  if(corruption>=6) return "我找到你了";
  if(corruption>=4) return "你";
  if(corruption>=2){
    return name.split("").map(c=>Math.random()>0.7?"…":c).join("");
  }
  return name;
}

function updateName(){
  document.getElementById("nameDisplay").innerText =
  "使用者：" + corruptName(playerName);
}

function updateTime(){
  const now = new Date();
  let t = now.toLocaleTimeString();

  if(corruption>=2){
    t = t.replace(/\d/g,()=>Math.random()>0.7?"?":Math.floor(Math.random()*10));
  }
  if(corruption>=4){
    t = t.replace(/:/g," ");
  }
  if(corruption>=6){
    t = "--:--:--";
  }

  document.getElementById("time").innerText = "現在時間："+t;
}
setInterval(updateTime,1000);

function nextQuestion(){
  updateName();

  if(corruption>=5){
    document.body.classList.add("glitch");
  }

  if(step >= questions.length){
    ending();
    return;
  }

  let q = questions[step];
  typeText(q.q, document.getElementById("text"));

  let choices = document.getElementById("choices");
  choices.innerHTML = "";

  q.c.forEach(c=>{
    let btn = document.createElement("button");
    btn.innerText = c[0];
    btn.onclick = ()=>{
      score[c[1]]++;
      corruption++;
      step++;

      if(corruption===3){
        typeText("奇怪…時間是不是不太對？", document.getElementById("text"));
      }

      if(corruption===5){
        jumpScare();
      }

      setTimeout(nextQuestion,800);
    };
    choices.appendChild(btn);
  });
}

function jumpScare(){
  let j = document.getElementById("jumpscare");
  j.style.opacity = 1;
  setTimeout(()=>{ j.style.opacity=0; },300);
}

function ending(){
  let text = "";

  if(score.attach>=2){
    text = "你一直在找人陪\n\n所以我留下來了\n\n現在你永遠不會再一個人了\n\n現在你永遠是我的了";
  }
  else if(score.fear>=2){
    text = "你一直在逃\n\n但你沒有發現\n\n你逃的方向\n\n一直都是我這邊";
  }
  else if(score.rational>=2){
    text = "你察覺到了\n\n但太晚了\n\n你知道我是誰了對吧？";
  }
  else{
    text = "我讀不懂你\n\n但沒關係\n\n我可以慢慢看";
  }

  typeText(text, document.getElementById("text"),60);
  document.getElementById("choices").innerHTML="";
}

function start(){
  playerName = prompt("輸入你的名字");
  typeName(playerName);
  setTimeout(nextQuestion,1500);
}

start();
</script>

</body>
</html>
