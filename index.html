<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>心理測驗</title>

<style>
body{
  background:#000;
  color:#0f0;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  overflow:hidden;
}

#game{
  width:90%;
  max-width:500px;
}

#text{
  min-height:120px;
  white-space:pre-line;
}

button,input{
  margin-top:10px;
  background:#111;
  color:#0f0;
  border:1px solid #0f0;
  padding:8px;
}

.glitch{
  animation:glitch 0.1s infinite;
}

@keyframes glitch{
  0%{transform:translate(1px,0)}
  50%{transform:translate(-1px,1px)}
  100%{transform:translate(1px,-1px)}
}
</style>
</head>

<body>

<div id="game">
  <div id="text"></div>
  <div id="input"></div>
</div>

<script>

const textEl = document.getElementById("text");
const inputEl = document.getElementById("input");

let playerName = "";
let affection = 0;

function typeText(text, speed=40){
  return new Promise(resolve=>{
    textEl.innerText = "";
    let i=0;
    let interval=setInterval(()=>{
      textEl.innerText += text[i];
      i++;
      if(i>=text.length){
        clearInterval(interval);
        resolve();
      }
    },speed);
  });
}

function showChoices(choices){
  inputEl.innerHTML="";
  choices.forEach(c=>{
    let btn=document.createElement("button");
    btn.innerText=c.text;
    btn.onclick=()=>{
      affection += c.affection || 0;
      c.next();
    };
    inputEl.appendChild(btn);
  });
}

function askName(){
  textEl.innerText="告訴我你的名字…";
  inputEl.innerHTML='<input id="nameInput"><button onclick="saveName()">確定</button>';
}

function saveName(){
  playerName=document.getElementById("nameInput").value || "你";
  inputEl.innerHTML="";
  scene1();
}

function jumpScare(msg){
  textEl.innerText=msg;
  textEl.style.fontSize="42px";
  textEl.style.color="red";
  textEl.classList.add("glitch");

  document.body.style.background="#fff";

  // 嘗試音效（瀏覽器可能擋）
  let audio = new Audio("https://www.soundjay.com/human/sounds/scream-01.mp3");
  audio.play().catch(()=>{});

  setTimeout(()=>{
    document.body.style.background="#000";
    textEl.style.fontSize="20px";
    textEl.style.color="#0f0";
    textEl.classList.remove("glitch");
  },150);
}

async function scene1(){
  await typeText("開始測驗...");
  await typeText("現在時間是："+new Date().toLocaleTimeString(),30);
  await typeText("你一個人在房間時會？");

  showChoices([
    {text:"滑手機",affection:1,next:scene2},
    {text:"發呆",affection:2,next:scene2},
    {text:"關燈",affection:3,next:scene2}
  ]);
}

async function scene2(){
  await typeText("如果有人一直看著你？");

  showChoices([
    {text:"無視",affection:1,next:scene3},
    {text:"有點不舒服",affection:2,next:scene3},
    {text:"覺得熟悉",affection:4,next:scene3}
  ]);
}

async function scene3(){
  await typeText("你相信『被注視』嗎？");

  showChoices([
    {text:"不信",affection:1,next:ending},
    {text:"有可能",affection:3,next:ending},
    {text:"一直都在",affection:5,next:ending}
  ]);
}

async function ending(){

  inputEl.innerHTML="";

  await typeText("分析中...",50);
  await typeText("你的結果是：");

  if(affection<5){
    await typeText("【普通型人格】");
  }else if(affection<9){
    await typeText("【敏感型人格】");
  }else{
    await typeText("【連結型人格】");
  }

  await typeText("..."+playerName+"…",120);
  await typeText("你有沒有發現…",120);
  await typeText("問題越來越不像測驗？",120);

  setTimeout(()=>{
    jumpScare(playerName+"，我就在你後面");
  },1000);

  setTimeout(async ()=>{
    await typeText("…現在你是我的了",120);
  },2500);

  setTimeout(async ()=>{
    await typeText(playerName+"，現在你永遠是我的了",150);
  },4500);

}

// start
askName();

</script>

</body>
</html>
