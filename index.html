<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>心理測驗</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  color: #eee;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  transition: 0.5s;
}

#app {
  width: 90%;
  max-width: 500px;
  text-align: center;
}

h2 {
  min-height: 60px;
}

button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #444;
  cursor: pointer;
}

button:hover {
  background: #333;
  transform: translateX(5px);
}

input {
  padding: 10px;
  width: 90%;
  margin-top: 10px;
  background: #111;
  color: white;
  border: 1px solid #444;
}
</style>
</head>

<body>

<div id="app">
  <h2 id="text"></h2>
  <div id="choices"></div>
</div>

<script>

/* ===== 變數 ===== */
let playerName = "";
let score = { calm:0, sensitive:0, defensive:0, open:0 };

const textEl = document.getElementById("text");
const choicesEl = document.getElementById("choices");

let step = 0;

/* ===== 時間 ===== */
function getNowTime() {
  const now = new Date();
  return now.getHours() + ":" + String(now.getMinutes()).padStart(2,'0');
}

/* ===== 打字 ===== */
function typeText(str, speed=40, cb) {
  textEl.innerText = "";
  let i=0;
  let t=setInterval(()=>{
    textEl.innerText += str[i];
    i++;
    if(i>=str.length){
      clearInterval(t);
      if(cb) cb();
    }
  },speed);
}

/* ===== 名字慢慢出現 ===== */
function typeName(name, speed=200, cb) {
  textEl.innerText = "";
  textEl.style.letterSpacing = "2px";

  let i=0;
  let t=setInterval(()=>{
    textEl.innerText += name[i];
    i++;
    if(i>=name.length){
      clearInterval(t);
      if(cb) cb();
    }
  },speed);
}

/* ===== 題目 ===== */
const flow = [

{ type:"input", text:"請輸入你的名字" },
{ type:"msg", text:"我記住了" },

{
type:"q", text:"你比較常在哪種環境放鬆？",
c:[
{t:"安靜", s:"calm"},
{t:"熱鬧", s:"open"},
{t:"自己", s:"defensive"},
{t:"戶外", s:"sensitive"}
]},

{ type:"msg", text:"原來你是這種人" },

{
type:"q", text:"你通常幾點睡？",
c:[
{t:"很早", s:"calm"},
{t:"普通", s:"open"},
{t:"很晚", s:"sensitive"},
{t:"不固定", s:"defensive"}
]},

{ type:"msg", text:"難怪那個時間…" },

{
type:"q", text:"有人默默關心你，你會？",
c:[
{t:"開心", s:"open"},
{t:"不確定", s:"calm"},
{t:"怪怪的", s:"defensive"},
{t:"無感", s:"sensitive"}
]},

{ type:"msg", text:"我就是那樣的人" },

{
type:"q", text:"你會鎖門嗎？",
c:[
{t:"一定會", s:"defensive"},
{t:"偶爾", s:"calm"},
{t:"很少", s:"open"},
{t:"不會", s:"sensitive"}
]},

{ type:"msg", text:"有時候其實不用鎖" },

{
type:"q", text:"你有沒有覺得有人在看你？",
c:[
{t:"有", s:"sensitive"},
{t:"沒有", s:"calm"},
{t:"偶爾", s:"open"},
{t:"不確定", s:"defensive"}
]},

{ type:"msg", text:"你終於注意到了" },

{
type:"q", text:"現在的你，是一個人嗎？",
c:[
{t:"是", s:"calm"},
{t:"不是", s:"sensitive"}
]}

];

/* ===== 顯示 ===== */
function show() {
  choicesEl.innerHTML = "";
  let item = flow[step];

  if(item.type==="input"){
    typeText(item.text);

    let input=document.createElement("input");
    input.placeholder="你的名字";

    let btn=document.createElement("button");
    btn.innerText="確認";

    btn.onclick=()=>{
      playerName = input.value || "你";
      next();
    };

    choicesEl.appendChild(input);
    choicesEl.appendChild(btn);
    return;
  }

  if(item.type==="q"){
    typeText(item.text);

    item.c.forEach(choice=>{
      let btn=document.createElement("button");
      btn.innerText=choice.t;

      btn.onclick=()=>{
        score[choice.s]++;
        next();
      };

      choicesEl.appendChild(btn);
    });

  } else {
    typeText(item.text);
    setTimeout(()=>{ step++; show(); },1500);
  }
}

function next(){
  step++;
  if(step<flow.length) show();
  else ending();
}

/* ===== 結果 ===== */
function getResult(){
  let max="calm";
  for(let k in score){
    if(score[k]>score[max]) max=k;
  }
  return max;
}

/* ===== 💀 結尾 ===== */
function ending(){
  choicesEl.innerHTML="";

  typeText("分析中...",60);

  setTimeout(()=>typeText("分析你的選擇...",60),1500);

  setTimeout(()=>{
    let r=getResult();
    let txt="";
    if(r==="calm") txt="你是理性型人格";
    if(r==="sensitive") txt="你是敏感型人格";
    if(r==="defensive") txt="你是防備型人格";
    if(r==="open") txt="你是開放型人格";
    typeText(txt,50);
  },3000);

  setTimeout(()=>{
    typeText("也因此…你更容易被注意到",60);
  },6000);

  setTimeout(()=>{
    typeText("……",200);
  },9000);

  setTimeout(()=>{
    typeText("現在時間是：" + getNowTime(),80);
  },11000);

  setTimeout(()=>{
    typeText("我是在這個時間看到你的",80);
  },13000);

  setTimeout(()=>{
    document.body.style.background="#000";
    typeText("你還沒發現嗎？",80);
  },15000);

  setTimeout(()=>{
    typeName(playerName,250,()=>{
      setTimeout(()=>{
        typeText("…現在你是我的了",120);
      },500);
    });
  },17000);

  setTimeout(()=>{
    typeName(playerName,300,()=>{
      setTimeout(()=>{
        typeText("，現在你永遠是我的了",150);
      },400);
    });
  },20000);
}

show();

</script>

</body>
</html>
