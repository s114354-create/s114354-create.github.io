<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>沉香辭世甲</title>

<style>
body{
  background:black;
  color:#0f0;
  font-family:monospace;
  text-align:center;
  padding:30px;
}

#text{
  font-size:20px;
  margin:30px;
  min-height:60px;
}

button,input{
  background:black;
  color:#0f0;
  border:1px solid #0f0;
  padding:10px;
  margin:10px;
}

.glitch{
  animation:glitch 0.15s infinite;
}

@keyframes glitch{
  0%{transform:translate(1px,1px);}
  50%{transform:translate(-1px,-1px);}
  100%{transform:translate(1px,-1px);}
}
</style>
</head>

<body>

<div id="text"></div>
<div id="choices"></div>

<script>
let textEl=document.getElementById("text");
let choicesEl=document.getElementById("choices");

let playerName="";
let affection=0;
let lastChoiceText="";

// 🐢 打字
async function typeText(text, baseSpeed=90){
  textEl.innerText="";
  for(let i=0;i<text.length;i++){
    textEl.innerText+=text[i];
    let randomDelay=Math.random()*120;
    let extraDelay=/[，。！？…]/.test(text[i])?300:0;
    await new Promise(r=>setTimeout(r, baseSpeed+randomDelay+extraDelay));
  }
}

async function typeName(name){
  textEl.innerText="";
  for(let i=0;i<name.length;i++){
    textEl.innerText+=name[i];
    await new Promise(r=>setTimeout(r,200));
  }
}

function showChoices(arr){
  choicesEl.innerHTML="";
  arr.forEach(c=>{
    let btn=document.createElement("button");
    btn.innerText=c.text;
    btn.onclick=()=>{
      lastChoiceText=c.text;
      affection+=c.affection||0;
      c.next();
    };
    choicesEl.appendChild(btn);
  });
}

// 💀 污染
function corruptText(level=1){
  let chars="█▓▒░<>/\\!?";
  setInterval(()=>{
    let t=textEl.innerText.split("");
    for(let i=0;i<t.length;i++){
      if(Math.random()<0.02*level){
        t[i]=chars[Math.floor(Math.random()*chars.length)];
      }
    }
    textEl.innerText=t.join("");
  },120);
}

function mutateText(){
  setInterval(()=>{
    let t=textEl.innerText;
    textEl.innerText=t.replace(/你/g,"我");
  },1200);
}

// ⚡ 閃
function flashJumpScare(){
  let flash=document.createElement("div");
  flash.style.position="fixed";
  flash.style.top="0";
  flash.style.left="0";
  flash.style.width="100%";
  flash.style.height="100%";
  flash.style.display="flex";
  flash.style.alignItems="center";
  flash.style.justifyContent="center";
  flash.style.fontSize="40px";
  flash.style.fontWeight="bold";
  flash.style.zIndex="9999";

  document.body.appendChild(flash);

  flash.style.background="white";
  flash.style.color="black";
  flash.innerText=playerName+"，不要回頭";

  setTimeout(()=>{
    flash.style.background="red";
    flash.innerText="我一直都愛你";
  },180);

  setTimeout(()=>{
    flash.style.background="black";
    flash.style.color="red";
    flash.innerText="你逃不掉";
  },360);

  setTimeout(()=>{
    flash.remove();
  },650);
}

// 👁 游標
function glitchCursor(){
  setInterval(()=>{
    document.body.style.cursor=Math.random()>0.5?"none":"default";
  },250);
}

// 💀 簡嚇
function jumpScare(){
  textEl.innerText="你後面有人";
  textEl.classList.add("glitch");
}

// ⏳ 假當機
async function fakeFreeze(){
  textEl.innerText="載入中.";
  await new Promise(r=>setTimeout(r,800));
  textEl.innerText="載入中..";
  await new Promise(r=>setTimeout(r,800));
  textEl.innerText="載入中...";
  await new Promise(r=>setTimeout(r,2000));
  textEl.innerText="錯誤";
  await new Promise(r=>setTimeout(r,1000));
}

// 📺 雜訊
function noiseScreen(){
  let noise=document.createElement("div");
  noise.style.position="fixed";
  noise.style.top="0";
  noise.style.left="0";
  noise.style.width="100%";
  noise.style.height="100%";
  noise.style.background="black";
  noise.style.color="#0f0";
  noise.style.fontSize="10px";
  noise.style.whiteSpace="pre-wrap";
  noise.style.zIndex="9998";
  document.body.appendChild(noise);

  let chars="█▓▒░";
  let interval=setInterval(()=>{
    let content="";
    for(let i=0;i<1000;i++){
      content+=chars[Math.floor(Math.random()*chars.length)];
    }
    noise.innerText=content;
  },50);

  return {noise, interval};
}

// ⚡ 大閃
function bigFlash(){
  let flash=document.createElement("div");
  flash.style.position="fixed";
  flash.style.top="0";
  flash.style.left="0";
  flash.style.width="100%";
  flash.style.height="100%";
  flash.style.background="white";
  flash.style.zIndex="9999";
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),150);
}

// 🌑 黑屏
function blackScreen(){
  let black=document.createElement("div");
  black.style.position="fixed";
  black.style.top="0";
  black.style.left="0";
  black.style.width="100%";
  black.style.height="100%";
  black.style.background="black";
  black.style.zIndex="9999";
  document.body.appendChild(black);
}

function getTime(){
  return new Date().toLocaleTimeString();
}

// 🟢 開始
async function start(){
  await typeText("請輸入你的名字");
  choicesEl.innerHTML='<input id="nameInput"><button onclick="submitName()">確定</button>';
}

async function submitName(){
  playerName=document.getElementById("nameInput").value;
  choicesEl.innerHTML="";

  await typeText("正在讀取...");
  await new Promise(r=>setTimeout(r,1000));

  await typeName(playerName);
  await new Promise(r=>setTimeout(r,500));

  await typeText(playerName+"，現在時間是 "+getTime());

  scene1();
}

// 🟢 流程（略微保留原邏輯）

async function scene1(){
  await typeText("你平常喜歡做什麼？");
  showChoices([
    {text:"滑手機",next:scene2},
    {text:"睡覺",next:scene2},
    {text:"發呆",next:scene2}
  ]);
}

async function scene2(){
  await typeText("你相信巧合嗎？");
  showChoices([
    {text:"相信",next:scene3},
    {text:"不信",next:scene3},
    {text:"看情況",next:scene3}
  ]);
}

async function scene3(){
  await typeText("如果有人一直關注你，你會？");
  showChoices([
    {text:"開心",next:scene4},
    {text:"不舒服",next:scene4},
    {text:"無所謂",next:scene4}
  ]);
}

async function scene4(){
  await typeText("你有沒有覺得，手機會自己亮？");
  showChoices([
    {text:"沒有",next:scene5},
    {text:"好像有",next:scene5},
    {text:"常常",next:scene5}
  ]);
}

async function scene5(){
  await typeText("你現在，是一個人嗎？");
  showChoices([
    {text:"是",next:scene6},
    {text:"不是",next:scene6},
    {text:"不知道",next:scene6}
  ]);
}

async function scene6(){
  await typeText("你剛剛，有回頭看嗎？");
  setTimeout(()=>flashJumpScare(),900);
  showChoices([
    {text:"沒有",next:scene7},
    {text:"有",next:scene7},
    {text:"為什麼問",next:scene7}
  ]);
}

async function scene7(){
  await typeText("你剛剛選了「"+lastChoiceText+"」");
  await typeText("不要再亂選了");
  showChoices([
    {text:"你怎麼知道",next:scene8},
    {text:"巧合吧",next:scene8},
    {text:"……",next:scene8}
  ]);
}

async function scene8(){
  glitchCursor();
  await typeText("這不是測驗，是篩選");
  showChoices([
    {text:"篩選什麼",next:scene9},
    {text:"不好笑",next:scene9},
    {text:"我要關掉",next:scene9}
  ]);
}

async function scene9(){
  await typeText("畫面開始怪怪的？");
  corruptText(1.5);
  mutateText();
  setTimeout(()=>flashJumpScare(),1200);
  showChoices([
    {text:"有",next:scene10},
    {text:"沒有",next:scene10},
    {text:"停止",next:scene10}
  ]);
}

async function scene10(){
  await fakeFreeze();
  await typeText("如果你關掉這個頁面…會怎樣？");
  showChoices([
    {text:"沒事",next:ending},
    {text:"有點怕",next:ending},
    {text:"你會跟來",next:ending}
  ]);
}

// ☠️ 結尾（已整合新效果）
async function ending(){
  choicesEl.innerHTML="";
  textEl.classList.add("glitch");

  await typeText("分析中...");
  await new Promise(r=>setTimeout(r,2000));

  await typeText("已找到匹配對象");

  flashJumpScare();

  await typeText(playerName+"，你的結果是：");
  await typeText("『適合被持續觀察的人』");

  await typeText("現在你永遠是我的了");

  // 📺 雜訊
  let {noise, interval} = noiseScreen();
  await new Promise(r=>setTimeout(r,1500));

  // ⚡ 大閃
  bigFlash();

  clearInterval(interval);
  noise.remove();

  // 🌑 黑屏
  blackScreen();
  await new Promise(r=>setTimeout(r,2000));

  // 🧊 收尾
  textEl.classList.remove("glitch");
  textEl.innerText="";
  await typeText("感謝遊玩");
}

start();
</script>

</body>
</html>
